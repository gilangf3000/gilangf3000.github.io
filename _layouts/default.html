<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="keywords"
    content="{% if page.keywords %}{{ page.keywords | join: ', ' }}{% else %}{{ site.keywords | join: ', ' }}{% endif %}">
  <meta name="theme-color" content="#1a1a1b">
  <meta name="monetag" content="a16fbc8ac757d5f77aae10e51455757a">
  <script src="https://quge5.com/88/tag.min.js" data-zone="223231" async data-cfasync="false"></script>
  {% seo %}
  {% feed_meta %}
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/default.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="{{ '/assets/js/script.js' | relative_url }}"></script>
  <script data-goatcounter="https://gilangf3000.goatcounter.com/count"
        async src="//gc.zgo.at/count.js"></script>
</head>

<body>

  <header class="site-header" id="header">
    <div class="container header-content">
      <a class="site-title" href="{{ '/' | relative_url }}">{{ site.title }}</a>
      {% if page.url == "/" or page.url == "/index.html" %}
      <div class="search-container" id="search-container">
        <button id="search-toggle" aria-label="Toggle search"><i class="fa-solid fa-magnifying-glass"></i></button>
        <div class="search-input-wrapper">
          <input type="text" id="post-search" placeholder="cari postingan..." aria-label="Search posts">
          <button id="search-close" aria-label="Close search"><i class="fa-solid fa-xmark"></i></button>
        </div>
      </div>
      {% endif %}
    </div>
  </header>

  <main>
    <div class="container">
      {{ content }}
    </div>
  </main>

  <footer>
    <div class="container">
      <p>dibuat pake jekyll &bull; {{ site.time | date: '%Y' }} &bull; santuy aja.</p>
    </div>
  </footer>

</body>

</html>
